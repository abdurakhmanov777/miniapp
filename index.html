<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="header">
        <div id="bot_name_display"></div>
    </div>
    <div id="main">
        <h1>Конструктор</h1>
        <button id="create" class="start-button">Создать бота</button>
        <button id="my_bots" class="start-button">Мои боты</button>
    </div>
    <div id="bot_list">
        <div id="bot_list_container">
            <ul id="bot_list_items" style="display: none;"></ul> <!-- Скрываем список по умолчанию -->
        </div>
        <button id="back_to_main" class="back-button">Назад</button>
    </div>

    <form id="form">
        <input type="text" placeholder="Название" id="bot_name">
        <input type="text" placeholder="Bot API" id="bot_api">
        <div id="error"></div>
        <div class="button-container">
            <button id="back" type="button">Назад</button>
            <button id="order" type="button">Далее</button>
        </div>
    </form>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
