<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="header">
        <button id="language-toggle" class="language-toggle-button"></button>
        <button id="bot_name_display" class="bot_name_display-button"></button>
    </div>
    <div id="main">
        <h1></h1>
        <div id="button-container">
            <button id="create" class="start-button"></button>
            <button id="my_bots" class="start-button"></button>
        </div>
    </div>
    <form id="bot_list">
        <div id="bot_list_container">
            <ul id="bot_list_items" style="display: none;"></ul>
        </div>
        <button id="back_to_main" class="back-button"></button>
    </form>

    <form id="form">
        <input type="text" placeholder="" id="bot_name">
        <input type="text" placeholder="" id="bot_api">
        <div id="error"></div>
        <div class="button-container">
            <button id="back" type="button"></button>
            <button id="order" type="button"></button>
        </div>
    </form>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
