<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f7f7f7);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--tg-theme-text-color, #333);
        }

        .form-container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transform: scale(0);
            animation: fadeInUp 0.6s ease-in-out forwards;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333; /* Всегда темный цвет текста */
        }

        input {
            padding: 12px;
            font-size: 16px;
            width: 100%;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
        }

        /* Цвета для светлой темы */
        .light-theme input:focus {
            border-color: #7a4fb4; /* Темно-фиолетовая */
            box-shadow: 0 0 5px rgba(122, 79, 180, 0.6);
        }

        .light-theme button {
            background-color: #7a4fb4; /* Фиолетовая кнопка */
        }

        .light-theme button:hover {
            background-color: #673594;
        }

        .light-theme button:active {
            transform: scale(0.98);
        }

        /* Цвета для темной темы */
        .dark-theme input:focus {
            border-color: #d1a2f5; /* Светло-фиолетовая */
            box-shadow: 0 0 5px rgba(209, 162, 245, 0.6);
        }

        .dark-theme button {
            background-color: #d1a2f5; /* Светло-фиолетовая кнопка */
        }

        .dark-theme button:hover {
            background-color: #a678c2;
        }

        .dark-theme button:active {
            transform: scale(0.98);
        }

        /* Изменение цвета текста в зависимости от темы */
        .dark-theme h1 {
            color: #333; /* Серый цвет для темной темы */
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            color: #ffffff;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s ease;
            width: 100%;
        }

        @keyframes fadeInUp {
            to {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Введите имя бота</h1>
        <input type="text" id="bot-name-input" placeholder="Введите имя бота">
        <button onclick="goNext()">Далее</button>
    </div>

    <script>
        // Определяем текущую тему на основе темы Телеграм
        if (Telegram.WebApp.themeParams) {
            const theme = Telegram.WebApp.themeParams.bg_color_dark ? 'dark' : 'light';
            document.body.classList.add(`${theme}-theme`);
        }

        function goNext() {
            const botName = document.getElementById("bot-name-input").value;
            if (botName) {
                fetch("http://localhost:8000/api/submit_bot_name", {  // Измени на реальный адрес бэкенда
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        bot_name: botName,
                        user_id: Telegram.WebApp.initDataUnsafe.user.id  // Получаем user_id из Telegram
                    })
                }).then(response => response.json())
                .then(data => {
                    console.log("Ответ сервера:", data);
                    Telegram.WebApp.close();
                })
                .catch(error => console.error("Ошибка:", error));
            } else {
                alert("Введите имя бота");
            }
        }
    </script>
</body>
</html>
