<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
            color: var(--tg-theme-text-color);
            background: var(--tg-theme-bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #main {
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 15px;
            font-weight: 500;
        }

        button {
            border: none;
            border-radius: 8px;
            height: 50px;
            width: 220px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease;
            color: var(--tg-theme-button-text-color);
            background: var(--tg-theme-button-color);

        }

        button:hover {
            filter: brightness(0.9);
        }

        form {
            display: none;
            flex-direction: column;
            width: 90%;
            max-width: 320px;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: var(--tg-theme-secondary-bg-color);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid silver;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #db5d5d;
        }
    </style>
</head>
<body>
    <div id="main">
        <h1>Онлайн магазин</h1>
        <button id="buy">Купить</button>
    </div>
    <form id="form">
        <input type="text" placeholder="Имя" id="user_name">
        <input type="text" placeholder="Телефон" id="user_phone">
        <input type="text" placeholder="Email" id="user_email">

        <div id="error"></div>
        <button id="order" type="button">Оформить заказ</button>
    </form>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        let buy = document.getElementById("buy")
        let order = document.getElementById("order")
        tg.expand();

        buy.addEventListener("click", () => {
            document.getElementById("main").style.display = "none";
            document.getElementById("form").style.display = "block";
            // document.getElementById("user_name").value = tg.initDataUnsafe.user.first_name || "";
        })

        order.addEventListener("click", () => {
            document.getElementById("error").innerText = '';
            let name = document.getElementById("user_name").value;
            let email = document.getElementById("user_email").value;
            let phone = document.getElementById("user_phone").value;
            if(name.length < 5) {
                document.getElementById("error").innerText = 'Ошибка в имени';
                return;
            }
            if(email.length < 5) {
                document.getElementById("error").innerText = 'Ошибка в email';
                return;
            }
            if(phone.length < 5) {
                document.getElementById("error").innerText = 'Ошибка в номере телефона';
                return;
            }
            let data = {
                name: name,
                email: email,
                phone: phone
            }
            tg.sendData(JSON.stringify(data))
            tg.close()
        })

    </script>
</body>
</html>
