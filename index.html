<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <div id="sidebar">
            <ul>
                <button id="mainBtn"></button>
                <button id="subscriptionsBtn"></button>
                <button id="settingsBtn"></button>
            </ul>
            <div id="sidebarFooter">
                <p>ProjectByDalgat</p>
            </div>
        </div>
        <div id="topPanel">
            <button class="menu-button" id="menuBtn">
                <!-- <span id="line1"></span>
                <span id="line2"></span> -->
                <div class="icon-menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 8.5H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M3 15.5H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
            </button>
        </div>
        <div id="main" class="page">
            <h1></h1>
            <div id="buttonContainer">
                <button id="createBotButton" class="start-button"></button>
                <button id="myBotsButton" class="start-button"></button>
            </div>
        </div>
        <div id="botList" class="page" style="display: none;">
            <div id="botListContainer">
                <ul id="botListItems" style="display: none;"></ul>
                <!-- Добавляем скрытое сообщение для отсутствующих ботов -->
                <p id="noBotsMessage" class="no-bots-message" style="display: none;"></p>
            </div>
        </div>

        <form id="botForm" class="page" style="display: none;">
            <input type="text" placeholder="" id="botNameInput">
            <div id="botNameError" class="error-message"></div>

            <input type="text" placeholder="" id="botApiInput">
            <div id="botApiError" class="error-message"></div>

            <div class="buttonContainer">
                <button id="backButton" class="button"></button>
                <button id="nextButton" class="button"></button>
            </div>
        </form>
        <div id="subscriptionsSection" class="page" style="display: none;">
        </div>
        <div id="settingsSection" class="page" style="display: none;">
            <div class="settings-list">
                <button id="userIdBtn" class="settings-item">
                    <div class="icon">
                        <img src="/miniapp/css/icon/user_id.svg">
                    </div>
                    <div class="content">
                        <span class="title">User ID</span>
                        <span id="userIdValue" class="value"></span>
                    </div>
                </button>
            </div>
            <div class="settings-list">
                <button id="languageToggleButton" class="settings-item">
                    <div class="icon">
                        <img src="/miniapp/css/icon/language.svg">
                    </div>
                    <div class="content">
                        <span id="textSystemLanguage" class="title"></span>
                        <span id="textValueLanguage" class="value"></span>
                    </div>
                    <div class="arrow">›</div>
                </button>
                <button id="themeToggleButton" class="settings-item">
                    <div class="icon">
                        <img src="/miniapp/css/icon/theme.svg">
                    </div>
                    <div class="content">
                        <span id="textTheme"  class="title"></span>
                        <span id="textValueTheme"  class="value"></span>
                    </div>
                    <div class="arrow">›</div>
                </button>
            </div>
            <div class="settings-list">
                <button id="contact_admin" class="settings-item">
                    <div class="icon">
                        <img src="/miniapp/css/icon/telegram.svg">
                    </div>
                    <div class="content">
                        <span id="textContactAdmin" class="title"></span>
                        <span id="textContactAdminValue" class="value"></span>
                    </div>
                    <div class="arrow">›</div>
                </button>
            </div>
        </div>
        <div id="languageSection" class="page" style="display: none;">
            <h2></h2>
            <div class="settings-list">
                <label class="settings-option">
                    <input type="radio" name="language" value="en">
                    <div class="text">
                        <span>English</span>
                        <small>English</small>
                    </div>
                    <i class="checkmark">
                        <img src="/miniapp/css/icon/chekmark.svg">
                    </i>
                </label>
                <label class="settings-option">
                    <input type="radio" name="language" value="ru">
                    <div class="text">
                        <span>Russian</span>
                        <small>Русский</small>
                    </div>
                    <i class="checkmark">
                        <img src="/miniapp/css/icon/chekmark.svg">
                    </i>
                </label>
            </div>
        </div>
        <div id="themeSection" class="page" style="display: none;">
            <h3></h3>
            <div class="settings-list">
                <label class="settings-option">
                    <input type="radio" name="theme" value="system">
                    <div class="text">
                        <span id="textThemeSystem"></span>
                    </div>
                    <i class="checkmark">
                        <img src="/miniapp/css/icon/chekmark.svg">
                    </i>
                </label>
                <label class="settings-option">
                    <input type="radio" name="theme" value="dark">
                    <div class="text">
                        <span id="textThemeDark"></span>
                    </div>
                    <i class="checkmark">
                        <img src="/miniapp/css/icon/chekmark.svg">
                    </i>
                </label>
                <label class="settings-option">
                    <input type="radio" name="theme" value="light">
                    <div class="text">
                        <span id="textThemeLight"></span>
                    </div>
                    <i class="checkmark">
                        <img src="/miniapp/css/icon/chekmark.svg">
                    </i>
                </label>
            </div>
        </div>
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
        <script type="module" src="js/init.js"></script>
    </body>
</html>
