<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <div id="sidebar">
            <ul>
                <button id="mainBtn"><a href="#"></a></>
                <button id="subscriptionsBtn"><a href="#"></a></>
                <button id="settingsBtn"><a href="#"></a></>
            </ul>
            <div id="sidebarFooter">
                <p>ProjectByDalgat</p>
            </div>
        </div>
        <div id="topPanel">
            <button class="menu-button" id="menuBtn">
                <span id="line1"></span>
                <span id="line2"></span>
            </button>
            <button id="userIdDisplay"></button>
        </div>
        <div id="main" class="page">
            <h1></h1>
            <div id="buttonContainer">
                <button id="createBotButton" class="start-button"></button>
                <button id="myBotsButton" class="start-button"></button>
            </div>
        </div>
        <div id="botList" style="display: none;">
            <div id="botListContainer">
                <ul id="botListItems" style="display: none;"></ul>
                <!-- Добавляем скрытое сообщение для отсутствующих ботов -->
                <p id="noBotsMessage" class="no-bots-message" style="display: none;"></p>
            </div>
            <button id="backToMainButton" class="back-button"></button>
        </div>

        <form id="botForm" class="page" style="display: none;">
            <input type="text" placeholder="" id="botNameInput">
            <div id="botNameError" class="error-message"></div>

            <input type="text" placeholder="" id="botApiInput">
            <div id="botApiError" class="error-message"></div>

            <div class="buttonContainer">
                <button id="backButton" class="button"></button>
                <button id="nextButton" class="button"></button>
            </div>
        </form>
        <div id="subscriptionsSection" class="page" style="display: none;">
        </div>
        <div id="settingsSection" class="page" style="display: none;">
            <div class="settings-list">
                <button id="languageToggleButton" class="settings-item">
                    <div class="icon" style="background-color: #a054e8;">
                        🌐
                    </div>
                    <div class="content">
                        <span id="textSystemLanguage" class="title"></span>
                        <span id="textValueLanguage" class="value"></span>
                    </div>
                    <div class="arrow">›</div>
                </button>
                <div class="separator"></div>
                <button id="themeToggleButton" class="settings-item">
                    <div class="icon" style="background-color: #007aff;">
                        📌
                    </div>
                    <div class="content">
                        <span id="textTheme"  class="title"></span>
                        <span id="textValueTheme"  class="value"></span>
                    </div>
                    <div class="arrow">›</div>
                </button>
            </div>

        </div>
        <div id="languageSection" class="page" style="display: none;">
            <!-- <button id="languageButton"></button> -->
            <div class="language-selector">
                <label class="language-option">
                    <input type="radio" name="language" value="en" checked>
                    <div class="text">
                        <span>English</span>
                        <small>English</small>
                    </div>
                    <i class="checkmark">✔</i>
                </label>
                <div class="separator"></div>
                <label class="language-option">
                    <input type="radio" name="language" value="ru">
                    <div class="text">
                        <span>Russian</span>
                        <small>Русский</small>
                    </div>
                    <i class="checkmark">✔</i>
                </label>
            </div>
        </div>
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
        <script type="module" src="js/script.js"></script>
    </body>
</html>
