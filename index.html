<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Конструктор</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="header">
        <div id="bot_name_display"></div>
    </div>
    <div id="main">
        <h1>Конструктор</h1>
        <button id="create" class="start-button">Создать бота</button>
    </div>
    <div id="bot_list">
        <h2>Мои боты</h2>
        <ul id="bot_list_items"></ul>
    </div>

    <form id="form">
        <input type="text" placeholder="Название" id="bot_name">
        <input type="text" placeholder="Bot API" id="bot_api">
        <div id="error"></div>
        <div class="button-container">
            <button id="back" type="button">Назад</button>
            <button id="order" type="button">Далее</button>
        </div>
    </form>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
