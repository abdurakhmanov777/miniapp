<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background-color: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Привет, Telegram Mini App!</h1>
    <p id="user-info">Загрузка...</p>
    <button onclick="closeApp()">Закрыть приложение</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем мини-приложение на весь экран

        document.getElementById("user-info").innerText = `Привет, ${tg.initDataUnsafe.user?.first_name || 'пользователь'}!`;

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
